name: Setup Go
description: 'Sets up Go environment with private modules'
inputs:
  stainless-api-key:
    required: false
    description: the value of the STAINLESS_API_KEY secret
runs:
  using: composite
  steps:
    - uses: stainless-api/retrieve-github-access-token@1f03f929b746c5b03dcdafa2bebbb18ca5672e1a # v1
      if: github.repository == 'stainless-sdks/openai-cli' && inputs.stainless-api-key != ''
      id: get_token
      with:
        repo: stainless-sdks/openai-go
        stainless-api-key: ${{ inputs.stainless-api-key }}

    - name: Configure Git for access to the Go SDK's staging repo
      if: steps.get_token.outputs.github_access_token != ''
      shell: bash
      env:
        GITHUB_ACCESS_TOKEN: ${{ steps.get_token.outputs.github_access_token }}
      run: |
        {
          echo "GIT_CONFIG_COUNT=1"
          echo "GIT_CONFIG_KEY_0=url.https://x-access-token:${GITHUB_ACCESS_TOKEN}@github.com/stainless-sdks/openai-go.insteadOf"
          echo "GIT_CONFIG_VALUE_0=https://github.com/stainless-sdks/openai-go"
        } >> "$GITHUB_ENV"

    - name: Setup go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version-file: ./go.mod

    - name: Bootstrap
      shell: bash
      run: ./scripts/bootstrap
