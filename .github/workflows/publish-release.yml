---
name: Publish Release
permissions:
  contents: read

concurrency:
  group: publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v1.2.3"
        required: true
        type: string
jobs:
  goreleaser:
    if: github.repository == 'openai/openai-cli'
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Ensure release tag is on main
      env:
        GITHUB_TOKEN: ${{ github.token }}
        TAG: ${{ inputs.tag }}
      run: |
        case "$TAG" in
          v*) ;;
          *) echo "Release tag must start with v: $TAG"; exit 1 ;;
        esac
        git check-ref-format "refs/tags/$TAG"

        authenticated_origin="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        remote_tag="$(git ls-remote --exit-code --tags --refs "$authenticated_origin" "refs/tags/$TAG")"
        remote_ref="$(printf '%s\n' "$remote_tag" | awk '{print $2}')"
        test "$remote_ref" = "refs/tags/$TAG"

        git fetch --no-tags "$authenticated_origin" +refs/heads/main:refs/remotes/origin/main
        git fetch --no-tags "$authenticated_origin" "+refs/tags/$TAG:refs/tags/$TAG"

        local_ref="$(git for-each-ref --format='%(refname)' "refs/tags/$TAG")"
        test "$local_ref" = "refs/tags/$TAG"

        tag_sha="$(git rev-parse "refs/tags/$TAG^{commit}")"
        echo "Release tag $TAG resolves to $tag_sha"
        git merge-base --is-ancestor "$tag_sha" origin/main
        git checkout --detach "$tag_sha"
        test "$(git rev-parse HEAD)" = "$tag_sha"
    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version-file: "go.mod"
    - name: Create release app token for this repo
      id: app-token
      uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
      with:
        app-id: ${{ secrets.RELEASE_APP_ID }}
        private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
        permission-contents: write
    - name: Create release app token for homebrew-tools
      id: tap-token
      uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
      with:
        app-id: ${{ secrets.RELEASE_APP_ID }}
        private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
        owner: openai
        repositories: homebrew-tools
        permission-contents: write
        permission-pull-requests: write
    - name: Read GoReleaser version
      id: goreleaser-version
      run: echo "version=$(cat .goreleaser-version)" >> "$GITHUB_OUTPUT"
    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf # v6.1.0
      with:
        version: ${{ steps.goreleaser-version.outputs.version }}
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.tap-token.outputs.token }}
        GORELEASER_CURRENT_TAG: ${{ inputs.tag }}
        MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
        MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
        MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
        MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
        MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
    - name: Attest release artifacts
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
      with:
        subject-path: dist/*
    - name: Verify release artifact attestations
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        find dist -maxdepth 1 -type f -print0 | while IFS= read -r -d '' file; do
          gh attestation verify "$file" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/publish-release.yml"
        done
