name: CI
permissions:
  contents: read
on:
  push:
    branches:
      - main
  pull_request:
    branches-ignore:
      - 'stl-preview-head/**'
      - 'stl-preview-base/**'

env:
  GOPRIVATE: github.com/openai/openai-go/v3,github.com/stainless-sdks/openai-go/v3
  IS_TRUSTED_SOURCE: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
  SOURCE_BRANCH: ${{ github.head_ref || github.ref_name }}

jobs:
  lint:
    timeout-minutes: 10
    name: lint
    runs-on: ${{ startsWith(github.repository, 'stainless-sdks/') && 'depot-ubuntu-24.04' || 'ubuntu-latest' }}
    if: github.event_name != 'push' || github.event.head_commit.message != 'codegen metadata'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go
        with:
          stainless-api-key: ${{ secrets.STAINLESS_API_KEY }}

      - name: Link staging branch
        if: |-
          github.repository == 'stainless-sdks/openai-cli' &&
          env.IS_TRUSTED_SOURCE == 'true'
        env:
          GO_SDK_REPLACEMENT: github.com/stainless-sdks/openai-go/v3@${{ env.SOURCE_BRANCH }}
        run: |
          ./scripts/link "$GO_SDK_REPLACEMENT" || true

      - name: Bootstrap
        run: ./scripts/bootstrap

      - name: Run lints
        run: ./scripts/lint

  build:
    timeout-minutes: 10
    name: build
    permissions:
      contents: read
      id-token: write
    runs-on: ${{ startsWith(github.repository, 'stainless-sdks/') && 'depot-ubuntu-24.04' || 'ubuntu-latest' }}
    if: github.event_name != 'push' || github.event.head_commit.message != 'codegen metadata'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go
        with:
          stainless-api-key: ${{ secrets.STAINLESS_API_KEY }}

      - name: Link staging branch
        if: |-
          github.repository == 'stainless-sdks/openai-cli' &&
          env.IS_TRUSTED_SOURCE == 'true'
        env:
          GO_SDK_REPLACEMENT: github.com/stainless-sdks/openai-go/v3@${{ env.SOURCE_BRANCH }}
        run: |
          ./scripts/link "$GO_SDK_REPLACEMENT" || true

      - name: Bootstrap
        run: ./scripts/bootstrap

      - name: Read GoReleaser version
        id: goreleaser-version
        run: echo "version=$(cat .goreleaser-version)" >> "$GITHUB_OUTPUT"

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf # v6.1.0
        with:
          version: ${{ steps.goreleaser-version.outputs.version }}
          args: release --snapshot --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get GitHub OIDC Token
        if: |-
          github.repository == 'stainless-sdks/openai-cli' &&
          env.IS_TRUSTED_SOURCE == 'true' &&
          !startsWith(env.SOURCE_BRANCH, 'stl/')
        id: github-oidc
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: core.setOutput('github_token', await core.getIDToken());

      - name: Upload tarball
        if: |-
          github.repository == 'stainless-sdks/openai-cli' &&
          env.IS_TRUSTED_SOURCE == 'true' &&
          !startsWith(env.SOURCE_BRANCH, 'stl/')
        env:
          URL: https://pkg.stainless.com/s
          AUTH: ${{ steps.github-oidc.outputs.github_token }}
          SHA: ${{ github.sha }}
        run: ./scripts/utils/upload-artifact.sh

  test:
    timeout-minutes: 10
    name: test
    runs-on: ${{ startsWith(github.repository, 'stainless-sdks/') && 'depot-ubuntu-24.04' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go
        with:
          stainless-api-key: ${{ secrets.STAINLESS_API_KEY }}

      - name: Link staging branch
        if: |-
          github.repository == 'stainless-sdks/openai-cli' &&
          env.IS_TRUSTED_SOURCE == 'true'
        env:
          GO_SDK_REPLACEMENT: github.com/stainless-sdks/openai-go/v3@${{ env.SOURCE_BRANCH }}
        run: |
          ./scripts/link "$GO_SDK_REPLACEMENT" || true

      - name: Bootstrap
        run: ./scripts/bootstrap

      - name: Run tests
        run: ./scripts/test
